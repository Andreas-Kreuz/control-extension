<!doctype html>
<html lang="de">
  <head>
    {% include head-content.html %}
    <style>
      .page-hero {
        background-color: transparent;
      }
    </style>
  </head>
  <body
    data-bs-spy="scroll"
    data-bs-target="#navbar-example2"
    data-bs-offset="10"
    tabindex="0"
    style="background:
   url('{{ site.baseurl }}/assets/img/landing-page.jpg');
   background-size: 50rem;
   background-position: right -18rem;
   background-repeat: no-repeat;
   "
  >
    {% include navbar.html %}
    <div class="container-fluid">
      <div class="container">
        <div class="row">
          <div class="col col-sm-8 col-md-6 m-0">
            <div class="page-hero py-5">
              <h1 class="display-4">{{ page.title }}</h1>
              {% if page.subtitle %}
              <p class="lead">{{ page.subtitle }}</p>
              {% endif %}
            </div>
          </div>
        </div>
      </div>

      {{ content }}
    </div>
    {% include footer.html %} {% include scripts.html %}
  </body>
</html>
