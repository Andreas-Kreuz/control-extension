---
layout: bootstrap_with_toc
---

<article class="container position-relative">
  <div class="row g-4">
    <div class="col-12 col-lg-3 order-1 order-lg-2">
      <div class="sticky-lg-top">
        <aside id="my-toc-navbar" class="toc-sidebar overflow-y-auto ps-3 py-3 mb-4 mb-lg-0 border-start">
          <nav aria-labelledby="toc-title">
            <div id="toc-title" class="toc-title">Inhalt</div>
            <div class="toc-list">
              {% include toc-bootstrap-nav-list.html html=content h_max=4 %}
            </div>
          </nav>
        </aside>
      </div>
    </div>
    <div class="col-12 col-lg-9 order-2 order-lg-1">{{ content }}</div>
  </div>
</article>
