name: deploy-pages - Build and publish GitHub Pages site

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: pages

      - name: Generate Pages screenshots
        run: node ./scripts/run-update-doc-assets.mjs

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: node ./scripts/run-jekyll.mjs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages/docs/_site

  deploy:
    name: Deploy Pages artifact
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
