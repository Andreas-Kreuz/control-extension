name: check:lua - Lua linting and testing

on: [push, pull_request]

jobs:
  lint-lua:
    name: lint:lua
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: '5.3'
          buildCache: false

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v5

      - name: Install Lua tools
        run: |
          luarocks install luacheck
          luarocks install busted

      - name: Run lint:lua
        run: |
          # Entspricht lokal: yarn lint:lua
          luacheck --config .luacheckrc lua/LUA

  test-lua:
    name: test:lua
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: '5.3'
          buildCache: false

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v5

      - name: Install Lua tools
        run: |
          luarocks install luacheck
          luarocks install busted

      - name: Run test:lua
        run: |
          # Entspricht lokal: yarn test:lua
          busted --config-file .busted --output=plainTerminal --verbose --
